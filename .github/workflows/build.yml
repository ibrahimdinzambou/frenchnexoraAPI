name: Build Providers

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC — provider health check

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Minified Providers
        run: npm run build:minify

      - name: Commit & Push Compiled Providers
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add providers/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: udpate minified providers [skip ci]" && git push)

  monitor:
    name: Provider Health Monitor
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Providers
        run: npm run build:minify

      - name: Run Health Monitor
        run: node monitor.js --quick --json 2>&1 || true

      - name: Upload Monitor Results
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de3b88e1d28a6b7d9c
        with:
          name: provider-health-report
          path: |
            monitor-results.json
          retention-days: 30